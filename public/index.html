<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>The Platform - Multiplayer</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        #menu, #room-menu { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); z-index: 10; }
        .hidden { display: none !important; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; margin: 10px; border: none; background: #444; color: white; border-radius: 5px; }
        button:hover { background: #666; }
        #chat-box { position: absolute; bottom: 20px; left: 20px; width: 300px; height: 200px; background: rgba(0,0,0,0.5); overflow-y: auto; padding: 10px; }
        #chat-input { position: absolute; bottom: 0; left: 20px; width: 300px; }
        #room-display { position: absolute; top: 10px; right: 10px; font-size: 18px; color: yellow; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>THE PLATFORM</h1>
        <button onclick="showRoomMenu()">멀티플레이 시작</button>
    </div>

    <div id="room-menu" class="hidden">
        <h2>멀티플레이 설정</h2>
        <button onclick="createRoom()">방 만들기</button>
        <hr style="width: 200px;">
        <input type="text" id="join-code" placeholder="방 코드 입력" style="padding: 10px;">
        <button onclick="joinRoom()">방 접속하기</button>
        <button onclick="location.reload()" style="font-size: 12px;">뒤로가기</button>
    </div>

    <div id="room-display"></div>
    <div id="chat-box"></div>
    <input type="text" id="chat-input" placeholder="메시지 입력 후 Enter" class="hidden">

    <script>
        const socket = io();
        let currentRoom = "";

        function showRoomMenu() {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('room-menu').classList.remove('hidden');
        }

        function createRoom() {
            socket.emit('createRoom');
        }

        function joinRoom() {
            const code = document.getElementById('join-code').value.toUpperCase();
            if(code) socket.emit('joinRoom', code);
        }

        // 서버 응답 처리
        socket.on('roomCreated', (code) => {
            enterGame(code);
        });

        socket.on('joinedRoom', (code) => {
            enterGame(code);
        });

        socket.on('errorMsg', (msg) => alert(msg));

        function enterGame(code) {
            currentRoom = code;
            document.getElementById('room-menu').classList.add('hidden');
            document.getElementById('room-display').innerText = "방 코드: " + code;
            document.getElementById('chat-input').classList.remove('hidden');
            addChatMessage({ system: true, text: `[${code}] 방에 입장했습니다.` });
        }

        // 채팅 기능
        const chatInput = document.getElementById('chat-input');
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && chatInput.value) {
                socket.emit('sendMessage', {
                    roomCode: currentRoom,
                    text: chatInput.value,
                    sender: "익명"
                });
                chatInput.value = "";
            }
        });

        socket.on('chatMessage', (data) => {
            addChatMessage(data);
        });

        function addChatMessage(data) {
            const box = document.getElementById('chat-box');
            const msg = document.createElement('div');
            msg.innerText = data.system ? data.text : `${data.sender}: ${data.text}`;
            box.appendChild(msg);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
