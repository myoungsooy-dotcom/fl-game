<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>THE PLATFORM: AI EDITION</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* (이전과 동일한 CSS 스타일 사용) */
        body { background-color: #0d0d0d; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        #menu-screen { position: absolute; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-menu { width: 250px; padding: 15px; margin: 10px; background: transparent; color: #ff4757; border: 2px solid #ff4757; font-weight: bold; cursor: pointer; }
        #game-wrapper { display: flex; gap: 20px; padding: 20px; }
        .hidden { display: none !important; }
        #tower { border: 4px solid #333; width: 250px; height: 500px; position: relative; background: #111; }
        .floor { height: 25%; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: center; position: relative; }
        #platform { width: 100%; height: 25%; background: rgba(255, 165, 0, 0.3); border: 2px solid orange; position: absolute; top: -100%; left: 0; transition: top 0.6s; z-index: 5; }
        .player { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; margin: 2px; }
        .player.you { border-color: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        .panel { background: #222; padding: 15px; border-radius: 10px; width: 300px; }
        .bar-bg { width: 100%; height: 8px; background: #444; margin: 5px 0 15px; border-radius: 4px; overflow: hidden; }
        .hp-fill { height: 100%; background: #ff4757; transition: width 0.3s; }
        .hunger-fill { height: 100%; background: #f1c40f; transition: width 0.3s; }
        .btn-action { width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; font-weight: bold; }
        #chat-box { width: 300px; height: 400px; background: #000; border: 1px solid #333; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="menu-screen">
        <h1 style="color:#ff4757; font-size: 3em;">THE PLATFORM</h1>
        <button class="btn-menu" onclick="startSolo()">혼자하기 (AI 포함)</button>
        <button class="btn-menu" onclick="createRoom()">방 만들기</button>
        <input type="text" id="room-code" placeholder="방 코드" style="padding:10px; text-align:center;">
        <button class="btn-menu" onclick="joinRoom()">입장하기</button>
        <div id="lobby" class="hidden" style="margin-top:20px;">
            <p>방 코드: <span id="display-code"></span></p>
            <button class="btn-menu" onclick="socket.emit('startGame', roomCode)">게임 시작</button>
        </div>
    </div>

    <div id="game-wrapper" class="hidden">
        <div id="tower">
            <div id="platform"></div>
            <div class="floor" id="f-1"></div>
            <div class="floor" id="f-2"></div>
            <div class="floor" id="f-3"></div>
            <div class="floor" id="f-4"></div>
        </div>
        <div class="panel">
            <h3>DAY <span id="day">1</span> | <span id="my-floor">?</span>F</h3>
            <div>HP: <span id="hp-val">100</span></div>
            <div class="bar-bg"><div id="hp-bar" class="hp-fill" style="width:100%"></div></div>
            <div>허기: <span id="hunger-val">100</span></div>
            <div class="bar-bg"><div id="hunger-bar" class="hunger-fill" style="width:100%"></div></div>
            <p style="color:red">남은 음식: <span id="food">8</span>개</p>
            <hr>
            <div id="timer" style="font-size: 2em; text-align: center; color: #ff4757;">30</div>
            <button id="eat-1" class="btn-action" onclick="eat(1)">음식 1개 먹기</button>
            <button id="eat-2" class="btn-action" onclick="eat(2)">음식 2개 먹기</button>
            <button id="ride" class="btn-action" onclick="ride()">플랫폼 탑승</button>
            <button id="attack" class="btn-action" onclick="attack()">무기 제작/공격</button>
        </div>
        <div id="chat-box">
            <div id="messages"></div>
            <input type="text" id="chat-in" onkeypress="if(event.keyCode==13) sendChat()" style="background:#222; color:#fff; border:none; padding:10px;">
        </div>
    </div>

    <script>
        const socket = io();
        let roomCode, myID, isRiding = false, hasEatenThisFloor = false, weaponReady = false;
        let gameState = { players: {}, foodCount: 8 };

        function startSolo() { socket.emit('createRoom', { nickname: "나", isSolo: true }); }
        function createRoom() { const n = prompt("닉네임?"); if(n) socket.emit('createRoom', { nickname: n, isSolo: false }); }
        function joinRoom() { const c = document.getElementById('room-code').value.toUpperCase(); const n = prompt("닉네임?"); if(c && n) socket.emit('joinRoom', { roomCode: c, nickname: n }); }

        socket.on('roomCreated', data => {
            roomCode = data.roomCode;
            if(data.isSolo) return;
            document.getElementById('display-code').innerText = roomCode;
            document.getElementById('lobby').classList.remove('hidden');
        });

        socket.on('gameStart', data => {
            myID = socket.id; roomCode = data.room.code;
            data.room.players.forEach(p => gameState.players[p.id] = p);
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-wrapper').classList.remove('hidden');
            gameLoop();
        });

        async function gameLoop() {
            const aliveIDs = Object.keys(gameState.players).filter(id => gameState.players[id].alive);
            const floors = [1,2,3,4].sort(()=>Math.random()-0.5);
            aliveIDs.forEach((id, i) => gameState.players[id].floor = floors[i%4]);
            
            isRiding = false; hasEatenThisFloor = false;
            render();

            for(let f=1; f<=4; f++) {
                document.getElementById('platform').style.top = (f-1)*25 + "%";
                // AI 행동 요청 (서버로)
                socket.emit('aiTurn', { roomCode, floor: f });

                if(gameState.players[myID].floor === f || isRiding) {
                    if(isRiding) gameState.players[myID].floor = f;
                    render();
                    await startTimer(15);
                } else {
                    await new Promise(r => setTimeout(r, 1000));
                }
                render();
            }
            if(gameState.players[myID].alive) socket.emit('nextDayReady', roomCode);
            else { alert("사망!"); location.reload(); }
        }

        function eat(amt) {
            if(hasEatenThisFloor || gameState.foodCount < amt) return;
            socket.emit('playerEat', { roomCode, amount: amt });
            hasEatenThisFloor = true;
        }

        function ride() { isRiding = true; render(); }

        function attack() {
            if(!weaponReady) { weaponReady = true; alert("무기 제작!"); return; }
            const myP = gameState.players[myID];
            const target = Object.values(gameState.players).find(p => p.floor === myP.floor && p.id !== myID && p.alive);
            if(target) socket.emit('playerAttack', { roomCode, targetID: target.id });
        }

        socket.on('syncEat', d => {
            gameState.foodCount = d.newFoodCount;
            if(gameState.players[d.eaterID]) gameState.players[d.eaterID].hunger = d.hunger;
            render();
        });

        socket.on('syncAttack', d => {
            if(gameState.players[d.targetID]) {
                gameState.players[d.targetID].hp = d.newHp;
                if(d.isDead) gameState.players[d.targetID].alive = false;
            }
            render();
        });

        socket.on('newDayStarted', d => {
            gameState.foodCount = d.room.foodCount;
            d.room.players.forEach(p => gameState.players[p.id] = p);
            gameLoop();
        });

        function render() {
            const myP = gameState.players[myID];
            document.getElementById('hp-val').innerText = Math.ceil(myP.hp);
            document.getElementById('hp-bar').style.width = myP.hp + "%";
            document.getElementById('hunger-val').innerText = Math.ceil(myP.hunger);
            document.getElementById('hunger-bar').style.width = myP.hunger + "%";
            document.getElementById('food').innerText = gameState.foodCount;
            document.getElementById('my-floor').innerText = myP.floor;
            document.getElementById('day').innerText = gameState.day || 1;

            for(let i=1; i<=4; i++) document.getElementById(`f-${i}`).innerHTML = "";
            Object.values(gameState.players).forEach(p => {
                if(p.alive && (p.floor === myP.floor || p.id === myID)) {
                    const div = document.createElement('div');
                    div.className = `player ${p.id === myID ? 'you' : ''}`;
                    div.style.backgroundColor = p.color;
                    div.innerHTML = `${p.name}<br>H:${Math.ceil(p.hunger)}`;
                    document.getElementById(`f-${p.floor}`).appendChild(div);
                }
            });
            // 버튼 활성화 로직
            document.getElementById('eat-1').disabled = hasEatenThisFloor || gameState.foodCount < 1;
            document.getElementById('eat-2').disabled = hasEatenThisFloor || gameState.foodCount < 2;
        }

        function startTimer(s) {
            return new Promise(res => {
                let count = s;
                const itv = setInterval(() => {
                    document.getElementById('timer').innerText = count;
                    if(count-- <= 0) { clearInterval(itv); res(); }
                }, 1000);
            });
        }

        function sendChat() { const i = document.getElementById('chat-in'); if(i.value) socket.emit('sendMsg', { roomCode, sender: gameState.players[myID].name, msg: i.value }); i.value=""; }
        socket.on('receiveMsg', d => { document.getElementById('messages').innerHTML += `<div><b>${d.sender}:</b> ${d.msg}</div>`; });
    </script>
</body>
</html>
