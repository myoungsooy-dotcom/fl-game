<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>The Platform Royale - Ultimate</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --main-red: #ff4757; --main-orange: #ff9f1a; --main-green: #2ecc71; }
        body { background: #0a0a0a; color: white; font-family: 'Pretendard', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        /* 메뉴 UI */
        #menu-screen { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #222, #000); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-menu { width: 280px; padding: 18px; margin: 10px; background: none; color: white; border: 2px solid var(--main-red); font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1.1em; }
        .btn-menu:hover { background: var(--main-red); box-shadow: 0 0 20px var(--main-red); transform: scale(1.05); }
        .input-code { padding: 15px; width: 150px; background: #000; color: #fff; border: 1px solid var(--main-red); text-align: center; font-size: 1.2em; }

        /* 게임 레이아웃 */
        #game-wrapper { display: flex; gap: 20px; padding: 20px; height: 85vh; max-width: 1200px; }
        #tower { border: 6px solid #2f3542; width: 280px; background: #1e1e2e; position: relative; flex-shrink: 0; }
        .floor { height: 25%; border-bottom: 2px solid #2f3542; position: relative; display: flex; align-items: center; justify-content: center; gap: 8px; }
        #platform-overlay { width: 100%; height: 25%; background: rgba(255,159,26,0.2); border: 4px solid var(--main-orange); position: absolute; transition: top 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 5; }
        
        .player { width: 50px; height: 50px; border-radius: 50%; border: 3px solid white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 10px; transition: 0.3s; }
        .player.you { border-color: var(--main-green); box-shadow: 0 0 15px var(--main-green); }

        /* 채팅 및 로그 */
        #side-panel { width: 350px; display: flex; flex-direction: column; gap: 15px; }
        #chat-box { flex: 1; background: #111; border: 1px solid #333; display: flex; flex-direction: column; border-radius: 10px; overflow: hidden; }
        #messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 13px; color: #ccc; }
        .msg { margin-bottom: 5px; border-left: 3px solid var(--main-red); padding-left: 8px; }
        
        .panel { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 10px; }
        #timer-display { font-size: 3.5em; color: var(--main-red); text-align: center; font-weight: 900; }
        .hidden { display: none !important; }
        #blackout { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 200; pointer-events: none; opacity: 0; transition: 0.5s; }
        #blackout.active { opacity: 1; }
    </style>
</head>
<body>
    <div id="blackout"></div>

    <div id="menu-screen">
        <h1 style="color:var(--main-red); font-size: 4em; text-shadow: 0 0 20px var(--main-red);">THE PLATFORM</h1>
        <div id="initial-ui">
            <button class="btn-menu" onclick="startSingleGame()">혼자 하기 (AI)</button><br>
            <button class="btn-menu" onclick="uiCreateRoom()">방 만들기</button><br>
            <input type="text" id="room-input" placeholder="코드" class="input-code">
            <button class="btn-menu" style="width:100px;" onclick="uiJoinRoom()">입장</button>
        </div>
        <div id="lobby-ui" class="hidden">
            <h2 style="color:var(--main-orange);">방 코드: <span id="code-display">----</span></h2>
            <p id="p-count">참여 인원: 0/4</p>
            <button id="start-btn" class="btn-menu" style="border-color:var(--main-green);" onclick="requestStart()">게임 시작!</button>
        </div>
    </div>

    <div id="game-wrapper" class="hidden">
        <div id="tower">
            <div id="platform-overlay"></div>
            <div class="floor" id="floor-1"></div>
            <div class="floor" id="floor-2"></div>
            <div class="floor" id="floor-3"></div>
            <div class="floor" id="floor-4"></div>
        </div>

        <div id="side-panel">
            <div class="panel">
                <div id="timer-display">30</div>
                <div style="display:flex; justify-content: space-between; font-weight:bold;">
                    <span>DAY <span id="day-val">1</span></span>
                    <span>층: <span id="floor-val">?</span>F</span>
                </div>
                <div style="margin-top:10px;">허기: <span id="hunger-val">100</span> | 음식: <span id="food-val">120</span></div>
                <button id="eat-btn" class="btn-menu" style="width:100%; margin:10px 0 0 0;" onclick="actionEat()">음식 먹기</button>
                <button id="ride-btn" class="btn-menu" style="width:100%; border-color:var(--main-orange); margin:5px 0 0 0;" onclick="actionRide()">플랫폼 탑승</button>
                <button id="weapon-btn" class="btn-menu" style="width:100%; border-color:#aaa; margin:5px 0 0 0;" onclick="handleWeapon()">파이프 제작</button>
            </div>

            <div id="chat-box">
                <div id="messages"></div>
                <div style="display:flex; padding:5px; background:#222;">
                    <input type="text" id="chat-input" style="flex:1; background:#000; color:#fff; border:1px solid #444; padding:8px;" onkeypress="if(event.keyCode==13) sendChat()">
                    <button onclick="sendChat()" style="background:var(--main-red); border:none; color:white; padding:0 10px;">전송</button>
                </div>
            </div>
            <div id="log-box" style="font-size:11px; color:#777; height:50px; overflow:hidden;"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let gameState = { day: 1, food: 120, players: {}, platformLevel: 0, isGameOver: false };
        let myID, isMulti = false, roomCode = null, isRiding = false, hasEaten = false, weaponStatus = "NOT_MADE";

        // [방 시스템]
        function uiCreateRoom() { const n = prompt("닉네임?"); if(n) socket.emit('createRoom', n); }
        function uiJoinRoom() { 
            const c = document.getElementById('room-input').value.toUpperCase();
            const n = prompt("닉네임?"); if(c && n) socket.emit('joinRoom', { roomCode: c, nickname: n });
        }
        function requestStart() { socket.emit('startGame', roomCode); }

        socket.on('roomCreated', (data) => {
            roomCode = data.roomCode;
            document.getElementById('initial-ui').classList.add('hidden');
            document.getElementById('lobby-ui').classList.remove('hidden');
            document.getElementById('code-display').innerText = roomCode;
            document.getElementById('p-count').innerText = `참여 인원: ${data.players.length}/4`;
        });

        socket.on('playerJoined', (data) => {
            document.getElementById('p-count').innerText = `참여 인원: ${data.players.length}/4`;
        });

        socket.on('gameStart', (data) => {
            isMulti = true; myID = socket.id; roomCode = data.room.code;
            data.room.players.forEach(p => { gameState.players[p.id] = p; });
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-wrapper').classList.remove('hidden');
            runDayCycle();
        });

        // [싱글 모드]
        function startSingleGame() {
            isMulti = false; myID = "me";
            gameState.players = { "me": { id:"me", name:"나", hunger:100, floor:0, alive:true, color:"var(--main-green)" } };
            for(let i=1; i<=3; i++) gameState.players[`ai${i}`] = { id:`ai${i}`, name:`AI${i}`, hunger:100, floor:0, alive:true, color:"#555", isAI:true };
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-wrapper').classList.remove('hidden');
            runDayCycle();
        }

        async function runDayCycle() {
            if(gameState.isGameOver) return;
            document.getElementById('blackout').classList.add('active');
            const floors = [1,2,3,4].sort(()=>Math.random()-0.5);
            Object.values(gameState.players).forEach((p,i) => { if(p.alive) p.floor = floors[i%4]; });
            isRiding = false; render();
            await new Promise(r => setTimeout(r, 600));
            document.getElementById('blackout').classList.remove('active');

            for(let f=1; f<=4; f++) {
                gameState.platformLevel = f;
                document.getElementById('platform-overlay').style.top = `${(f-1)*25}%`;
                hasEaten = false;
                if(gameState.players[myID].floor === f || isRiding) {
                    if(isRiding) gameState.players[myID].floor = f;
                    render(); updateButtons(f);
                    await startTimer(30);
                    disableButtons();
                } else {
                    if(!isMulti) { // AI 식사
                        Object.values(gameState.players).filter(p => p.floor === f && p.isAI && p.alive).forEach(ai => {
                            let eat = Math.min(gameState.food, 30); gameState.food -= eat;
                            ai.hunger = Math.min(100, ai.hunger + (eat * 1.1));
                        });
                    }
                    await new Promise(r => setTimeout(r, 1500));
                }
            }
            Object.values(gameState.players).forEach(p => { if(p.alive) { p.hunger -= 25; if(p.hunger<=0) p.alive=false; } });
            if(gameState.players[myID].alive) { gameState.day++; gameState.food = 120; setTimeout(runDayCycle, 1200); }
            else { alert("사망했습니다!"); location.reload(); }
        }

        // [핵심 액션]
        function actionEat() {
            if(hasEaten || gameState.food <= 0) return;
            hasEaten = true;
            if(isMulti) socket.emit('playerEat', { roomCode });
            else { gameState.food -= 40; gameState.players[myID].hunger = Math.min(100, gameState.players[myID].hunger + 55); render(); }
            updateButtons(gameState.platformLevel);
        }

        function handleWeapon() {
            if(weaponStatus === "NOT_MADE") {
                weaponStatus = "READY"; addLog("파이프 제작 완료!");
            } else if(weaponStatus === "READY") {
                const target = Object.values(gameState.players).find(p => p.floor === gameState.players[myID].floor && p.id !== myID && p.alive);
                if(target) {
                    if(isMulti) socket.emit('playerAttack', { roomCode, targetID: target.id });
                    else { target.hunger -= 30; if(target.hunger<=0) target.alive=false; render(); }
                    weaponStatus = "USED"; addLog(`${target.name} 공격!`);
                }
            }
            updateButtons(gameState.platformLevel);
        }

        function actionRide() { isRiding = true; document.getElementById('ride-btn').disabled = true; addLog("탑승 완료."); }

        function sendChat() {
            const i = document.getElementById('chat-input');
            if(!i.value) return;
            if(isMulti) socket.emit('sendMsg', { roomCode, sender: gameState.players[myID].name, msg: i.value });
            else addChatMessage("나", i.value);
            i.value = "";
        }

        // [동기화 수신]
        socket.on('syncEat', (data) => {
            gameState.food = data.newFood;
            if(gameState.players[data.eaterID]) gameState.players[data.eaterID].hunger = Math.min(100, gameState.players[data.eaterID].hunger + 55);
            render();
        });
        socket.on('syncAttack', (data) => {
            const t = gameState.players[data.targetID];
            if(t) { t.hunger -= 30; if(t.hunger<=0) t.alive=false; addLog(`${t.name} 피격!`); render(); }
        });
        socket.on('receiveMsg', (data) => addChatMessage(data.sender, data.msg));

        // [유틸리티]
        function startTimer(s) {
            return new Promise(res => {
                let t = s; const d = document.getElementById('timer-display');
                const itv = setInterval(() => { d.innerText = t; if(t-- <= 0) { clearInterval(itv); res(); } }, 1000);
            });
        }
        function render() {
            document.getElementById('day-val').innerText = gameState.day;
            document.getElementById('hunger-val').innerText = Math.ceil(gameState.players[myID].hunger);
            document.getElementById('food-val').innerText = gameState.food;
            document.getElementById('floor-val').innerText = gameState.players[myID].floor || "?";
            for(let i=1; i<=4; i++) document.getElementById(`floor-${i}`).innerHTML = `<span style="position:absolute;left:5px;top:5px;color:#333;font-size:10px;">${i}F</span>`;
            Object.values(gameState.players).forEach(p => {
                if(p.alive && p.floor > 0) {
                    const d = document.createElement('div');
                    d.className = `player ${p.id===myID?'you':''}`;
                    d.style.background = p.color;
                    d.innerHTML = `<span>${p.name}</span><span>${Math.ceil(p.hunger)}</span>`;
                    document.getElementById(`floor-${p.floor}`).appendChild(d);
                }
            });
        }
        function updateButtons(f) {
            document.getElementById('eat-btn').disabled = (hasEaten || gameState.food <= 0);
            document.getElementById('ride-btn').disabled = (f === 4 || isRiding);
            const wBtn = document.getElementById('weapon-btn');
            if(weaponStatus === "NOT_MADE") wBtn.innerText = "파이프 제작";
            else if(weaponStatus === "READY") wBtn.innerText = "파이프 사용";
            else { wBtn.innerText = "사용 완료"; wBtn.disabled = true; }
        }
        function disableButtons() { document.querySelectorAll('.btn-menu').forEach(b => { if(b.id !== 'start-btn') b.disabled = true; }); }
        function addChatMessage(s, m) {
            const b = document.getElementById('messages');
            b.innerHTML += `<div class="msg"><strong>${s}:</strong> ${m}</div>`;
            b.scrollTop = b.scrollHeight;
        }
        function addLog(m) {
            const b = document.getElementById('log-box');
            b.innerHTML = `> ${m}<br>` + b.innerHTML;
        }
    </script>
</body>
</html>
