<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>THE PLATFORM: THE FINAL</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* [디자인 복구] */
        body { background-color: #0d0d0d; color: white; font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        #blackout { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 200; pointer-events: none; opacity: 0; transition: opacity 0.4s; }
        #blackout.active { opacity: 1; }
        
        #menu-screen { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #222 0%, #000 100%); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .menu-title { font-size: 4em; color: #ff4757; text-shadow: 0 0 30px #ff4757; margin-bottom: 40px; font-weight: 900; }
        .btn-menu { display: block; width: 280px; padding: 18px; margin: 12px; background: transparent; color: white; border: 2px solid #ff4757; font-size: 1.3em; cursor: pointer; transition: 0.4s; font-weight: bold; }
        .btn-menu:hover { background: #ff4757; box-shadow: 0 0 20px #ff4757; transform: scale(1.05); }
        .btn-solo { border-color: #3498db; }
        
        #game-wrapper { display: flex; gap: 20px; padding: 20px; height: 85vh; }
        .hidden { display: none !important; }
        
        #tower { border: 6px solid #2f3542; width: 280px; background: #1e1e2e; position: relative; flex-shrink: 0; }
        .floor { height: 25%; border-bottom: 2px solid #2f3542; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #platform-overlay { width: 100%; height: 25%; background: rgba(255, 159, 26, 0.2); border: 4px solid #ff9f1a; position: absolute; top: -100%; left: 0; transition: top 0.6s; z-index: 5; box-shadow: 0 0 20px #ff9f1a; }
        
        .player { width: 60px; height: 60px; border-radius: 50%; border: 3px solid white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 10px; transition: 0.2s; background: #333; }
        .player.you { border-color: #2ecc71; box-shadow: 0 0 15px #2ecc71; z-index: 10; }
        
        #central-ui { width: 320px; display: flex; flex-direction: column; gap: 15px; }
        .panel { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 10px; }
        .stat-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 3px; font-weight: bold; }
        .bar-bg { width: 100%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; margin-bottom: 10px; }
        .hp-fill { height: 100%; background: #ff4757; transition: width 0.4s; }
        .hunger-fill { height: 100%; background: #f1c40f; transition: width 0.4s; }
        
        .btn-action { width: 100%; padding: 12px; margin-top: 8px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; color: white; }
        .btn-action:disabled { background: #333 !important; color: #666 !important; cursor: not-allowed; }
        #timer-display { font-size: 3.5em; color: #ff4757; text-align: center; font-weight: 900; }
        
        #chat-panel { width: 350px; background: #1a1a1a; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
        #chat-messages { flex: 1; height: 350px; overflow-y: auto; padding: 10px; background: #000; font-size: 13px; }
    </style>
</head>
<body>
    <div id="blackout"></div>

    <div id="menu-screen">
        <h1 class="menu-title">THE PLATFORM</h1>
        <button class="btn-menu btn-solo" onclick="startSolo()">혼자하기 (AI 포함)</button>
        <button class="btn-menu" onclick="createRoom()">방 만들기</button>
        <div style="margin-top:20px;">
            <input type="text" id="join-input" placeholder="방 코드" style="padding:15px; width:100px; background:#000; color:#fff; border:1px solid #ff4757;">
            <button class="btn-menu" style="display:inline-block; width:100px;" onclick="joinRoom()">입장</button>
        </div>
        <div id="lobby-ui" class="hidden" style="margin-top:20px; text-align:center;">
            <h2 style="color:#ff9f1a;">코드: <span id="code-display">---</span></h2>
            <button class="btn-menu" style="border-color:#2ecc71;" onclick="socket.emit('startGame', roomCode)">게임 시작</button>
        </div>
    </div>

    <div id="game-wrapper" class="hidden">
        <div id="tower">
            <div id="platform-overlay"></div>
            <div class="floor" id="f-1"></div>
            <div class="floor" id="f-2"></div>
            <div class="floor" id="f-3"></div>
            <div class="floor" id="f-4"></div>
        </div>

        <div id="central-ui">
            <div class="panel">
                <div style="font-weight:bold; color: #ff9f1a; margin-bottom:10px;">DAY <span id="day-val">1</span> | <span id="floor-val">?</span>F</div>
                <div class="stat-label"><span>HP</span><span id="hp-txt">100</span></div>
                <div class="bar-bg"><div id="hp-bar" class="hp-fill"></div></div>
                <div class="stat-label"><span>HUNGER</span><span id="hunger-txt">100</span></div>
                <div class="bar-bg"><div id="hunger-bar" class="hunger-fill"></div></div>
                <div style="text-align:right; font-size:12px; color:#ff4757;">남은 음식: <span id="food-val">8</span>개</div>
            </div>

            <div class="panel">
                <div id="timer-display">30</div>
                <div style="display:flex; gap:5px;">
                    <button id="eat1-btn" class="btn-action" style="background:#ff4757;" onclick="actionEat(1)">1개(+20)</button>
                    <button id="eat2-btn" class="btn-action" style="background:#c0392b;" onclick="actionEat(2)">2개(+50)</button>
                </div>
                <button id="ride-btn" class="btn-action" style="background:#ff9f1a;" onclick="actionRide()">플랫폼 탑승</button>
                <button id="weapon-btn" class="btn-action" style="background:#57606f;" onclick="handleWeapon()">파이프 제작</button>
                <div id="log-box" style="font-size:11px; color:#888; margin-top:10px; height:40px; overflow:hidden;"></div>
            </div>
        </div>

        <div id="chat-panel">
            <div id="chat-messages"></div>
            <div style="padding:10px; display:flex; gap:5px; background:#222;">
                <input type="text" id="chat-in" style="flex:1; background:#000; color:#fff; border:1px solid #444; padding:8px;" onkeypress="if(event.keyCode==13) sendChat()">
                <button onclick="sendChat()" style="background:#ff4757; border:none; color:white; padding:0 10px;">전송</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let roomCode, myID, isRiding = false, hasEatenThisFloor = false, weaponStatus = "NOT_MADE", attackUsedThisTurn = false;
        let gameState = { players: {}, foodCount: 8, day: 1 };

        // [방 제어]
        function startSolo() { socket.emit('createRoom', { nickname: "나", isSolo: true }); }
        function createRoom() { const n = prompt("닉네임?"); if(n) socket.emit('createRoom', { nickname: n, isSolo: false }); }
        function joinRoom() { 
            const c = document.getElementById('join-input').value.toUpperCase(); 
            const n = prompt("닉네임?"); 
            if(c && n) socket.emit('joinRoom', { roomCode: c, nickname: n }); 
        }

        socket.on('roomCreated', data => {
            roomCode = data.roomCode;
            if(data.isSolo) socket.emit('startGame', roomCode);
            else { 
                document.getElementById('code-display').innerText = roomCode; 
                document.getElementById('lobby-ui').classList.remove('hidden'); 
            }
        });

        socket.on('playerJoined', () => { addLog("플레이어가 입장했습니다."); });

        socket.on('gameStart', data => {
            myID = socket.id; roomCode = data.room.code;
            data.room.players.forEach(p => gameState.players[p.id] = p);
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-wrapper').classList.remove('hidden');
            runCycle();
        });

        // [게임 사이클]
        async function runCycle() {
            document.getElementById('blackout').classList.add('active');
            const aliveIDs = Object.keys(gameState.players).filter(id => gameState.players[id].alive);
            const floors = [1,2,3,4].sort(()=>Math.random()-0.5);
            aliveIDs.forEach((id, i) => gameState.players[id].floor = floors[i%4]);
            
            isRiding = false; hasEatenThisFloor = false; attackUsedThisTurn = false;
            render();
            await new Promise(r => setTimeout(r, 600));
            document.getElementById('blackout').classList.remove('active');

            for(let f=1; f<=4; f++) {
                document.getElementById('platform-overlay').style.top = (f-1)*25 + "%";
                socket.emit('aiTurn', { roomCode, floor: f }); // AI 행동 요청

                const myP = gameState.players[myID];
                if((myP.floor === f || isRiding) && myP.alive) {
                    if(isRiding) myP.floor = f;
                    render();
                    await startTimer(15);
                } else { await new Promise(r => setTimeout(r, 1200)); }
                render();
            }
            if(gameState.players[myID].alive) socket.emit('nextDayReady', roomCode);
            else { alert("당신은 사망했습니다."); location.reload(); }
        }

        // [액션]
        function actionEat(amount) {
            if(hasEatenThisFloor || gameState.foodCount < amount) return;
            socket.emit('playerEat', { roomCode, amount });
            hasEatenThisFloor = true; // 음식만 1회 제한, 다른 행동은 계속 가능
            addLog(`${amount}개 섭취 완료!`);
            render();
        }

        function actionRide() { isRiding = true; render(); addLog("플랫폼 탑승!"); }

        function handleWeapon() {
            if(weaponStatus === "NOT_MADE") { weaponStatus = "READY"; addLog("무기 제작 완료!"); }
            else if(!attackUsedThisTurn) {
                const myP = gameState.players[myID];
                const target = Object.values(gameState.players).find(p => p.floor === myP.floor && p.id !== myID && p.alive);
                if(target) {
                    socket.emit('playerAttack', { roomCode, targetID: target.id });
                    attackUsedThisTurn = true;
                    addLog(`${target.name} 공격!`);
                } else { addLog("공격 대상 없음"); }
            }
            render();
        }

        // [동기화]
        socket.on('syncEat', d => {
            gameState.foodCount = d.newFoodCount;
            if(gameState.players[d.eaterID]) gameState.players[d.eaterID].hunger = d.hunger;
            render();
        });

        socket.on('syncAttack', d => {
            if(gameState.players[d.targetID]) {
                gameState.players[d.targetID].hp = d.newHp;
                if(d.isDead) gameState.players[d.targetID].alive = false;
            }
            render();
        });

        socket.on('newDayStarted', d => {
            gameState.day = d.room.day;
            gameState.foodCount = d.room.foodCount;
            d.room.players.forEach(p => gameState.players[p.id] = p);
            addLog(`제 ${gameState.day}일이 시작되었습니다.`);
            runCycle();
        });

        // [렌더링]
        function render() {
            const myP = gameState.players[myID];
            if(!myP) return;

            document.getElementById('hp-txt').innerText = Math.ceil(myP.hp);
            document.getElementById('hp-bar').style.width = myP.hp + "%";
            document.getElementById('hunger-txt').innerText = Math.ceil(myP.hunger);
            document.getElementById('hunger-bar').style.width = myP.hunger + "%";
            document.getElementById('food-val').innerText = gameState.foodCount;
            document.getElementById('floor-val').innerText = myP.floor || "?";
            document.getElementById('day-val').innerText = gameState.day;

            for(let i=1; i<=4; i++) document.getElementById(`f-${i}`).innerHTML = "";

            Object.values(gameState.players).forEach(p => {
                if(p.alive && (p.floor === myP.floor || p.id === myID)) {
                    const div = document.createElement('div');
                    div.className = `player ${p.id === myID ? 'you' : ''}`;
                    div.style.backgroundColor = p.color;
                    div.innerHTML = `<span>${p.name}</span><br><span>H:${Math.ceil(p.hunger)}</span>`;
                    document.getElementById(`f-${p.floor}`).appendChild(div);
                }
            });

            // 버튼 상태 업데이트 (음식을 먹어도 탑승/공격은 가능!)
            document.getElementById('eat1-btn').disabled = (!myP.alive || hasEatenThisFloor || gameState.foodCount < 1);
            document.getElementById('eat2-btn').disabled = (!myP.alive || hasEatenThisFloor || gameState.foodCount < 2);
            document.getElementById('ride-btn').disabled = (!myP.alive || myP.floor === 4 || isRiding);
            
            const wBtn = document.getElementById('weapon-btn');
            if(weaponStatus === "NOT_MADE") { wBtn.innerText = "파이프 제작"; wBtn.disabled = !myP.alive; }
            else { wBtn.innerText = attackUsedThisTurn ? "공격 완료" : "파이프 공격"; wBtn.disabled = (!myP.alive || attackUsedThisTurn); }
        }

        function startTimer(s) { return new Promise(res => { let c = s; const d = document.getElementById('timer-display'); const itv = setInterval(() => { d.innerText = c; if(c-- <= 0) { clearInterval(itv); res(); }}, 1000); }); }
        function sendChat() { const i = document.getElementById('chat-in'); if(i.value) socket.emit('sendMsg', { roomCode, sender: gameState.players[myID].name, msg: i.value }); i.value=""; }
        socket.on('receiveMsg', d => { document.getElementById('chat-messages').innerHTML += `<div><b>${d.sender}:</b> ${d.msg}</div>`; });
        function addLog(m) { const b = document.getElementById('log-box'); b.innerHTML = `> ${m}<br>` + b.innerHTML; }
    </script>
</body>
</html>
