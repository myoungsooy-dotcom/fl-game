<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>The Platform Royale - Final Integrated</title>
    <style>
        /* CSS: 디자인 시스템 */
        body { 
            background-color: #0d0d0d; color: white; 
            font-family: 'Pretendard', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; margin: 0; overflow: hidden;
        }

        /* 암전 효과 (층 이동 시) */
        #blackout {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 200; pointer-events: none; opacity: 0;
            transition: opacity 0.6s;
        }
        #blackout.active { opacity: 1; }

        /* 메인 메뉴 화면 */
        #menu-screen {
            position: absolute; width: 100%; height: 100%; 
            background: radial-gradient(circle, #222 0%, #000 100%); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .menu-title { font-size: 4em; color: #ff4757; text-shadow: 0 0 30px #ff4757; margin-bottom: 40px; font-weight: 900; }
        .btn-menu { 
            display: block; width: 280px; padding: 18px; margin: 12px;
            background: transparent; color: white; border: 2px solid #ff4757;
            font-size: 1.3em; cursor: pointer; transition: 0.4s; font-weight: bold;
        }
        .btn-menu:hover { background: #ff4757; box-shadow: 0 0 20px #ff4757; transform: scale(1.05); }

        /* 게임 화면 레이아웃 */
        #game-wrapper { display: flex; gap: 20px; padding: 20px; max-width: 1200px; height: 85vh; }
        .hidden { display: none !important; }

        /* 타워 영역 */
        #tower { border: 6px solid #2f3542; width: 280px; background: #1e1e2e; position: relative; flex-shrink: 0; }
        .floor { height: 25%; border-bottom: 2px solid #2f3542; position: relative; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
        .floor-num { position: absolute; left: 10px; top: 10px; color: #57606f; font-weight: bold; }
        #platform-overlay { 
            width: 100%; height: 25%; background: rgba(255, 159, 26, 0.1); 
            border: 4px solid #ff9f1a; position: absolute; top: -100%; left: 0; 
            transition: top 1s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 25px #ff9f1a; z-index: 5; pointer-events: none;
        }

        /* 플레이어 유닛 */
        .player { width: 65px; height: 65px; border-radius: 50%; border: 3px solid white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; transition: 0.3s; z-index: 10; }
        .player.you { border-color: #2ecc71; box-shadow: 0 0 15px #2ecc71; }
        .player-stats { font-size: 10px; margin-top: 2px; }

        /* UI 패널 */
        #central-ui { width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .panel { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 10px; }
        #timer-display { font-size: 3em; color: #ff4757; text-align: center; font-weight: 900; }
        #action-btn { width: 100%; padding: 18px; font-size: 1.1em; font-weight: bold; background: #ff4757; color: white; border: none; cursor: pointer; border-radius: 5px; }
        #action-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        #system-log { height: 120px; overflow-y: auto; font-size: 12px; color: #888; border-top: 1px solid #333; margin-top: 10px; padding-top: 10px; }

        /* 채팅 시스템 */
        #chat-panel { width: 350px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
        #chat-tabs { display: flex; background: #2f3542; }
        .tab { flex: 1; padding: 10px; border: none; background: #57606f; color: white; cursor: pointer; font-size: 12px; }
        .tab.active { background: #ff4757; font-weight: bold; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 6px 10px; border-radius: 5px; background: #262626; line-height: 1.4; }
        .msg.floor-msg { border-left: 3px solid #70a1ff; background: #1e272e; }
        .msg.system { color: #ff9f1a; font-style: italic; background: none; }
        #chat-input-area { padding: 10px; display: flex; gap: 5px; background: #262626; }
        #chat-input { flex: 1; background: #000; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="blackout"></div>

    <div id="menu-screen">
        <h1 class="menu-title">THE PLATFORM</h1>
        <div id="main-btns">
            <button class="btn-menu" onclick="showModeSelect()">게임 시작</button>
            <button class="btn-menu" onclick="alert('준비 중인 기능입니다.')">환경 설정</button>
        </div>
        <div id="mode-btns" class="hidden">
            <button class="btn-menu" onclick="initGame(4)">4인 모드 (P1 vs AI)</button>
            <button class="btn-menu" onclick="hideModeSelect()">뒤로 가기</button>
        </div>
    </div>

    <div id="game-wrapper" class="hidden">
        <div id="tower">
            <div id="platform-overlay"></div>
            <div class="floor" id="floor-1"><span class="floor-num">1F</span></div>
            <div class="floor" id="floor-2"><span class="floor-num">2F</span></div>
            <div class="floor" id="floor-3"><span class="floor-num">3F</span></div>
            <div class="floor" id="floor-4"><span class="floor-num">4F</span></div>
        </div>

        <div id="central-ui">
            <div class="panel">
                <div style="font-weight:bold; color: #ff9f1a;">DAY <span id="day-val">0</span></div>
                <div style="margin: 8px 0;">나의 허기: <span id="hunger-val">100</span> / 100</div>
                <div>플랫폼 음식: <span id="food-val" style="color:#ff9f1a">0</span></div>
            </div>
            <div class="panel">
                <div id="timer-display">READY</div>
                <button id="action-btn" onclick="playerEat()" disabled>음식 먹기</button>
                <div id="system-log"></div>
            </div>
        </div>

        <div id="chat-panel">
            <div id="chat-tabs">
                <button class="tab active" id="tab-all" onclick="setChatMode('ALL')">전체 채팅</button>
                <button class="tab" id="tab-floor" onclick="setChatMode('FLOOR')">층별 채팅</button>
            </div>
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="메시지 입력..." onkeypress="if(event.keyCode==13) sendMessage()">
                <button onclick="sendMessage()" style="background:#ff4757; border:none; color:white; padding:5px 12px; cursor:pointer; border-radius:4px;">전송</button>
            </div>
        </div>
    </div>

    <script>
        // --- 게임 상태 변수 ---
        let players = [];
        let day = 0;
        let currentFood = 0;
        let chatMode = 'ALL';
        let hasEatenToday = false;
        let isGameActive = false;
        let timerInt = null;

        // --- 메뉴 로직 ---
        function showModeSelect() {
            document.getElementById('main-btns').classList.add('hidden');
            document.getElementById('mode-btns').classList.remove('hidden');
        }
        function hideModeSelect() {
            document.getElementById('mode-btns').classList.add('hidden');
            document.getElementById('main-btns').classList.remove('hidden');
        }

        // --- 게임 초기화 ---
        function initGame(count) {
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-wrapper').classList.remove('hidden');
            
            players = [
                { id: 1, name: "당신(P1)", hunger: 100, floor: 0, color: "#2ecc71", alive: true, isNPC: false },
                { id: 2, name: "AI P2", hunger: 100, floor: 0, color: "#3498db", alive: true, isNPC: true },
                { id: 3, name: "AI P3", hunger: 100, floor: 0, color: "#9b59b6", alive: true, isNPC: true },
                { id: 4, name: "AI P4", hunger: 100, floor: 0, color: "#e67e22", alive: true, isNPC: true }
            ];
            
            isGameActive = true;
            addChatMessage('SYSTEM', '타워 배틀로얄에 오신 것을 환영합니다.', 'system');
            startNextDay();
        }

        // --- 핵심 기능: 층 랜덤 배정 및 날짜 시작 ---
        async function startNextDay() {
            if (!isGameActive) return;
            day++;
            document.getElementById('day-val').innerText = day;
            currentFood = 120; // 하루치 식량
            document.getElementById('food-val').innerText = currentFood;
            hasEatenToday = false;

            // 암전 연출 및 층 배정
            const blackout = document.getElementById('blackout');
            blackout.classList.add('active');
            addLog(`제 ${day}일... 층이 무작위로 섞입니다.`);
            
            await new Promise(r => setTimeout(r, 800));

            let floors = [1, 2, 3, 4];
            players.forEach(p => {
                if (p.alive) {
                    let idx = Math.floor(Math.random() * floors.length);
                    p.floor = floors.splice(idx, 1)[0];
                }
            });

            render();
            blackout.classList.remove('active');
            addChatMessage('SYSTEM', `당신은 현재 ${players[0].floor}층에 있습니다.`, 'system');
            
            runPlatform();
        }

        // --- 플랫폼 하강 로직 ---
        async function runPlatform() {
            const plat = document.getElementById('platform-overlay');
            for (let f = 1; f <= 4; f++) {
                plat.style.top = `${(f-1) * 25}%`;
                await new Promise(r => setTimeout(r, 1000));

                const p = players.find(p => p.floor === f && p.alive);
                if (p) {
                    if (!p.isNPC) {
                        await handlePlayerAction();
                    } else {
                        // AI 행동 (1.5초)
                        let eat = Math.min(currentFood, 35);
                        currentFood -= eat;
                        p.hunger = Math.min(100, p.hunger + 25);
                        addLog(`${p.name}이(가) ${f}층에서 식사했습니다.`);
                        await new Promise(r => setTimeout(r, 1500));
                    }
                }
                document.getElementById('food-val').innerText = currentFood;
            }

            // 하루 종료
            plat.style.top = "-100%";
            addLog("배급 종료. 생존 여부를 확인합니다.");
            
            players.forEach(p => {
                if(p.alive) {
                    p.hunger -= 25; // 하루 기본 소모량
                    if(p.hunger <= 0) {
                        p.alive = false;
                        addLog(`${p.name} 사망.`);
                    }
                }
            });

            render();
            if (!players[0].alive) {
                alert("당신은 아사했습니다. 게임 오버.");
                location.reload();
            } else {
                setTimeout(startNextDay, 2500);
            }
        }

        // --- 플레이어 행동 (30초 대기) ---
        function handlePlayerAction() {
            return new Promise(async (resolve) => {
                const btn = document.getElementById('action-btn');
                const timer = document.getElementById('timer-display');
                if (currentFood > 0) btn.disabled = false;

                let timeLeft = 30; // 30초 대기
                timer.innerText = timeLeft;
                
                timerInt = setInterval(() => {
                    timeLeft--;
                    timer.innerText = timeLeft;
                    if (timeLeft <= 0) clearInterval(timerInt);
                }, 1000);

                await new Promise(r => setTimeout(r, 30000));
                
                btn.disabled = true;
                timer.innerText = "종료";
                clearInterval(timerInt);
                resolve();
            });
        }

        function playerEat() {
            if (hasEatenToday) return;
            const p = players[0];
            let eat = Math.min(currentFood, 45);
            currentFood -= eat;
            p.hunger = Math.min(100, p.hunger + 55);
            hasEatenToday = true;
            document.getElementById('action-btn').disabled = true;
            document.getElementById('food-val').innerText = currentFood;
            render();
            addLog("식사를 마쳤습니다.");
        }

        // --- 채팅 시스템 ---
        function setChatMode(mode) {
            chatMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${mode.toLowerCase()}`).classList.add('active');
            addChatMessage('SYSTEM', `채팅 모드: ${mode === 'ALL' ? '전체' : '층별'}`, 'system');
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const txt = input.value.trim();
            if (!txt) return;

            if (chatMode === 'FLOOR') {
                addChatMessage(`나(${players[0].floor}F)`, txt, 'floor-msg');
                // AI 반응
                const roommate = players.find(p => p.floor === players[0].floor && p.isNPC && p.alive);
                if (roommate) {
                    setTimeout(() => {
                        const res = ["적당히 먹읍시다.", "내일은 1층에 가고 싶군.", "조용히 좀 합시다.", "살아남을 수 있을까?"];
                        addChatMessage(`${roommate.name}(${roommate.floor}F)`, res[Math.floor(Math.random()*res.length)], 'floor-msg');
                    }, 1000);
                }
            } else {
                addChatMessage(`나(전체)`, txt);
            }
            input.value = '';
        }

        function addChatMessage(sender, msg, type = '') {
            const box = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = `<strong>${sender}:</strong> ${msg}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // --- 보조 함수 ---
        function render() {
            document.querySelectorAll('.floor').forEach(f => {
                const n = f.querySelector('.floor-num');
                f.innerHTML = ''; f.appendChild(n);
            });
            players.forEach(p => {
                if (p.alive && p.floor > 0) {
                    const fDiv = document.getElementById(`floor-${p.floor}`);
                    const pDiv = document.createElement('div');
                    pDiv.className = `player ${!p.isNPC ? 'you' : ''}`;
                    pDiv.style.backgroundColor = p.color;
                    pDiv.innerHTML = `<span style="font-size:10px">${p.name}</span><div class="player-stats">H:${p.hunger}</div>`;
                    fDiv.appendChild(pDiv);
                }
            });
            document.getElementById('hunger-val').innerText = players[0].hunger;
        }

        function addLog(m) {
            const log = document.getElementById('system-log');
            log.innerHTML = `> ${m}<br>` + log.innerHTML;
        }
    </script>
</body>
</html>
