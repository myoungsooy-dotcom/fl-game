<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>The Platform Royale</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0d0d0d; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        #menu-screen { position: absolute; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .btn-menu { width: 250px; padding: 15px; margin: 10px; background: none; color: white; border: 2px solid #ff4757; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-menu:hover { background: #ff4757; box-shadow: 0 0 15px #ff4757; }
        .hidden { display: none !important; }
        #game-wrapper { display: flex; gap: 20px; padding: 20px; }
        #tower { border: 5px solid #333; width: 240px; height: 500px; position: relative; background: #1a1a1a; }
        .floor { height: 25%; border-bottom: 2px solid #333; display: flex; align-items: center; justify-content: center; gap: 5px; position: relative; }
        #platform-overlay { width: 100%; height: 25%; background: rgba(255, 165, 0, 0.3); border: 3px solid orange; position: absolute; transition: top 0.6s; z-index: 5; }
        .player { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; font-size: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; }
        .player.you { border-color: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        .panel { background: #222; padding: 15px; border-radius: 10px; width: 280px; }
        #timer-display { font-size: 3em; color: #ff4757; text-align: center; margin: 10px 0; }
        #blackout { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 200; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
        #blackout.active { opacity: 1; }
    </style>
</head>
<body>
    <div id="blackout"></div>

    <div id="menu-screen">
        <h1 style="color:#ff4757; font-size: 3em;">THE PLATFORM</h1>
        <div id="main-btns">
            <button class="btn-menu" onclick="startSingleGame()">싱글 플레이 (AI)</button><br>
            <button class="btn-menu" onclick="uiCreateRoom()">방 만들기</button><br>
            <input type="text" id="room-input" placeholder="방 코드 입력" style="padding:10px; width:120px;">
            <button class="btn-menu" style="width:100px;" onclick="uiJoinRoom()">입장</button>
        </div>
        <div id="lobby-ui" class="hidden">
            <h2 style="color:orange;">방 코드: <span id="room-code-display">---</span></h2>
            <p id="player-count">대기 인원: 0/4</p>
            <button id="start-btn" class="btn-menu" style="border-color:#2ecc71;" onclick="requestStart()">게임 시작</button>
        </div>
    </div>

    <div id="game-wrapper" class="hidden">
        <div id="tower">
            <div id="platform-overlay"></div>
            <div class="floor" id="floor-1"></div>
            <div class="floor" id="floor-2"></div>
            <div class="floor" id="floor-3"></div>
            <div class="floor" id="floor-4"></div>
        </div>
        <div class="panel">
            <div id="timer-display">30</div>
            <p>허기: <span id="hunger-val">100</span> | 음식: <span id="food-val">120</span></p>
            <button id="eat-btn" class="btn-menu" style="width:100%;" onclick="actionEat()">음식 먹기</button>
            <button id="ride-btn" class="btn-menu" style="width:100%; border-color:orange;" onclick="actionRide()">플랫폼 탑승</button>
            <div id="log-box" style="font-size:12px; color:#888; margin-top:15px; height:80px; overflow:hidden;"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let gameState = { day: 1, food: 120, players: {}, platformLevel: 0, isGameOver: false };
        let myID = null;
        let isMulti = false;
        let roomCode = null;
        let isRiding = false;
        let hasEaten = false;

        // [방 시스템]
        function uiCreateRoom() {
            const nick = prompt("닉네임?");
            if(nick) socket.emit('createRoom', nick);
        }
        function uiJoinRoom() {
            const code = document.getElementById('room-input').value.toUpperCase();
            const nick = prompt("닉네임?");
            if(code && nick) socket.emit('joinRoom', { roomCode: code, nickname: nick });
        }
        function requestStart() { socket.emit('startGame', roomCode); }

        socket.on('roomCreated', (data) => {
            roomCode = data.roomCode;
            document.getElementById('main-btns').classList.add('hidden');
            document.getElementById('lobby-ui').classList.remove('hidden');
            document.getElementById('room-code-display').innerText = roomCode;
            document.getElementById('player-count').innerText = `대기 인원: ${data.players.length}/4`;
        });

        socket.on('playerJoined', (data) => {
            document.getElementById('main-btns').classList.add('hidden');
            document.getElementById('lobby-ui').classList.remove('hidden');
            document.getElementById('player-count').innerText = `대기 인원: ${data.players.length}/4`;
        });

        socket.on('gameStart', (data) => {
            isMulti = true; myID = socket.id;
            data.room.players.forEach(p => { gameState.players[p.id] = p; });
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-wrapper').classList.remove('hidden');
            runDayCycle();
        });

        // [싱글 모드]
        function startSingleGame() {
            isMulti = false; myID = "me";
            gameState.players = { "me": { id:"me", name:"나", hunger:100, floor:0, alive:true, color:"#2ecc71" } };
            for(let i=1; i<=3; i++) gameState.players[`ai${i}`] = { id:`ai${i}`, name:`AI${i}`, hunger:100, floor:0, alive:true, color:"#555", isAI:true };
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-wrapper').classList.remove('hidden');
            runDayCycle();
        }

        async function runDayCycle() {
            if(gameState.isGameOver) return;
            document.getElementById('blackout').classList.add('active');
            const floors = [1,2,3,4].sort(()=>Math.random()-0.5);
            Object.values(gameState.players).forEach((p,i) => { if(p.alive) p.floor = floors[i%4]; });
            isRiding = false; render();
            await new Promise(r => setTimeout(r, 600));
            document.getElementById('blackout').classList.remove('active');

            for(let f=1; f<=4; f++) {
                gameState.platformLevel = f;
                document.getElementById('platform-overlay').style.top = `${(f-1)*25}%`;
                hasEaten = false;
                if(gameState.players[myID].floor === f || isRiding) {
                    if(isRiding) gameState.players[myID].floor = f;
                    render();
                    document.getElementById('eat-btn').disabled = false;
                    document.getElementById('ride-btn').disabled = (f===4);
                    await startTimer(30);
                } else {
                    await new Promise(r => setTimeout(r, 1500));
                }
            }
            // 정산
            Object.values(gameState.players).forEach(p => { if(p.alive) { p.hunger -= 25; if(p.hunger<=0) p.alive=false; } });
            gameState.day++; gameState.food = 120;
            if(gameState.players[myID].alive) setTimeout(runDayCycle, 1000);
            else alert("사망했습니다.");
        }

        function startTimer(s) {
            return new Promise(res => {
                let t = s;
                const itv = setInterval(() => {
                    document.getElementById('timer-display').innerText = t;
                    if(t-- <= 0) { clearInterval(itv); res(); }
                }, 1000);
            });
        }

        function actionEat() {
            if(hasEaten || gameState.food <= 0) return;
            hasEaten = true;
            if(isMulti) socket.emit('playerEat', { roomCode });
            else { gameState.food -= 40; gameState.players[myID].hunger = Math.min(100, gameState.players[myID].hunger + 55); render(); }
            document.getElementById('eat-btn').disabled = true;
        }

        function actionRide() { isRiding = true; document.getElementById('ride-btn').disabled = true; }

        socket.on('syncEat', (data) => {
            gameState.food = data.newFood;
            if(gameState.players[data.eaterID]) gameState.players[data.eaterID].hunger = Math.min(100, gameState.players[data.eaterID].hunger + 55);
            render();
        });

        function render() {
            document.getElementById('hunger-val').innerText = Math.ceil(gameState.players[myID].hunger);
            document.getElementById('food-val').innerText = gameState.food;
            for(let i=1; i<=4; i++) document.getElementById(`floor-${i}`).innerHTML = "";
            Object.values(gameState.players).forEach(p => {
                if(p.alive && p.floor > 0) {
                    const d = document.createElement('div');
                    d.className = `player ${p.id===myID?'you':''}`;
                    d.style.background = p.color;
                    d.innerHTML = `${p.name}<br>${Math.ceil(p.hunger)}`;
                    document.getElementById(`floor-${p.floor}`).appendChild(d);
                }
            });
        }
    </script>
</body>
</html>
