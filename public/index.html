<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>더 플랫폼: 로얄 완성판</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #menu, #room-menu { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #111; z-index: 100; }
        .hidden { display: none !important; }
        
        /* 게임 화면 레이아웃 */
        #game-container { display: grid; grid-template-columns: 1fr 300px; height: 100vh; }
        #view-area { position: relative; border-right: 2px solid #333; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #ui-area { padding: 20px; background: #111; display: flex; flex-direction: column; }
        
        /* 캐릭터 및 플랫폼 비주얼 */
        .level-info { font-size: 80px; font-weight: bold; color: #555; }
        #platform { width: 400px; height: 40px; background: #444; border: 4px solid #888; margin-top: 20px; display: none; }
        #platform.active { background: #fff; box-shadow: 0 0 20px #fff; }
        
        #chat-box { flex-grow: 1; border: 1px solid #333; margin: 10px 0; padding: 10px; overflow-y: auto; font-size: 14px; }
        input { width: 100%; padding: 10px; box-sizing: border-box; background: #222; color: #fff; border: 1px solid #444; }
        button { padding: 15px 40px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer; font-size: 18px; }
        button:hover { background: #555; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>🏢 더 플랫폼: 로얄</h1>
        <button onclick="showRoomMenu()">멀티플레이 시작</button>
    </div>

    <div id="room-menu" class="hidden">
        <h2>구역 설정</h2>
        <button onclick="createRoom()">새 구역 생성 (방 만들기)</button>
        <p>또는</p>
        <input type="text" id="join-code" placeholder="구역 코드 입력" style="width: 200px; text-align: center;">
        <button onclick="joinRoom()" style="margin-top: 10px;">구역 접속</button>
    </div>

    <div id="game-container" class="hidden">
        <div id="view-area">
            <div id="my-level-text" class="level-info">LEVEL 00</div>
            <div id="platform"></div>
            <p id="platform-status">플랫폼 대기 중...</p>
        </div>
        <div id="ui-area">
            <h3 id="room-id-display">ROOM: ----</h3>
            <div id="status-bar">HP: 100 | 식사: 가능</div>
            <div id="chat-box"></div>
            <input type="text" id="chat-input" placeholder="메시지를 입력하세요...">
        </div>
    </div>

    <script>
        const socket = io();
        let myData = { room: "", id: "", level: 0 };

        function showRoomMenu() {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('room-menu').classList.remove('hidden');
        }

        function createRoom() { socket.emit('createRoom'); }
        function joinRoom() {
            const code = document.getElementById('join-code').value.toUpperCase();
            if(code) socket.emit('joinRoom', code);
        }

        socket.on('roomCreated', (code) => enterGame(code));
        socket.on('joinedRoom', (data) => {
            myData.level = data.players[data.myId].level;
            enterGame(data.roomCode);
            updatePlatform(data.currentPlatform);
        });

        function enterGame(code) {
            myData.room = code;
            document.getElementById('room-menu').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            document.getElementById('room-id-display').innerText = "구역: " + code;
            document.getElementById('my-level-text').innerText = "LEVEL " + myData.level;
        }

        // 플랫폼 이동 수신
        socket.on('platformMove', (level) => updatePlatform(level));

        function updatePlatform(level) {
            const p = document.getElementById('platform');
            const s = document.getElementById('platform-status');
            p.style.display = 'block';
            
            if (level === myData.level) {
                p.classList.add('active');
                s.innerText = "⭐ 플랫폼 도착! 식사 가능 ⭐";
            } else {
                p.classList.remove('active');
                s.innerText = `플랫폼이 ${level}층에 있습니다.`;
            }
        }

        // 채팅 기능
        const input = document.getElementById('chat-input');
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && input.value) {
                socket.emit('sendMessage', { roomCode: myData.room, text: input.value, sender: `Level ${myData.level}` });
                input.value = "";
            }
        });

        socket.on('chatMessage', (data) => {
            const box = document.getElementById('chat-box');
            const m = document.createElement('div');
            m.innerText = `${data.sender}: ${data.text}`;
            box.appendChild(m);
            box.scrollTop = box.scrollHeight;
        });

        socket.on('errorMsg', (m) => alert(m));
    </script>
</body>
</html>
