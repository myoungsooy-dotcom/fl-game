<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>THE PLATFORM - ULTIMATE EDITION</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --red: #ff4757; --orange: #ff9f1a; --green: #2ecc71; --bg: #0a0a0a; --panel: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Pretendard', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        /* 암전 효과 */
        #blackout { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 200; pointer-events: none; opacity: 0; transition: opacity 0.5s ease; }
        #blackout.active { opacity: 1; }

        /* 메뉴 화면 */
        #menu-screen { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #222, #000); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .title { font-size: 4em; color: var(--red); text-shadow: 0 0 20px var(--red); margin-bottom: 40px; font-weight: 900; letter-spacing: 5px; }
        .btn-menu { width: 280px; padding: 18px; margin: 10px; background: none; color: white; border: 2px solid var(--red); font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1.1em; }
        .btn-menu:hover { background: var(--red); box-shadow: 0 0 20px var(--red); transform: scale(1.05); }
        .input-code { padding: 15px; width: 140px; background: #000; color: #fff; border: 1px solid var(--red); text-align: center; font-size: 1.2em; outline: none; margin-bottom: 10px; }

        /* 대기실 UI */
        #lobby-ui { border: 1px dashed #555; padding: 30px; border-radius: 15px; background: rgba(0,0,0,0.6); text-align: center; }

        /* 게임 메인 레이아웃 */
        #game-wrapper { display: flex; gap: 25px; padding: 20px; height: 90vh; max-width: 1300px; width: 100%; justify-content: center; }
        
        /* 타워 영역 */
        #tower { border: 8px solid #2f3542; width: 300px; background: #1e1e2e; position: relative; flex-shrink: 0; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .floor { height: 25%; border-bottom: 2px solid #2f3542; position: relative; display: flex; align-items: center; justify-content: center; gap: 10px; }
        #platform-overlay { width: 100%; height: 25%; background: rgba(255,159,26,0.15); border: 5px solid var(--orange); position: absolute; transition: top 0.7s cubic-bezier(0.4, 0, 0.2, 1); z-index: 5; box-shadow: inset 0 0 20px var(--orange); }
        
        .player { width: 55px; height: 55px; border-radius: 50%; border: 3px solid white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 11px; transition: transform 0.3s; z-index: 10; }
        .player.you { border-color: var(--green); box-shadow: 0 0 15px var(--green); transform: scale(1.1); }

        /* 사이드 패널 */
        #side-panel { width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .panel { background: var(--panel); border: 1px solid #333; padding: 20px; border-radius: 12px; }
        #timer-display { font-size: 4em; color: var(--red); text-align: center; font-weight: 900; margin: 0; line-height: 1; }
        
        /* 채팅창 */
        #chat-box { flex: 1; background: #0a0a0a; border: 1px solid #333; display: flex; flex-direction: column; border-radius: 12px; overflow: hidden; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; color: #ddd; }
        .msg { margin-bottom: 8px; border-left: 3px solid var(--red); padding-left: 10px; line-height: 1.4; }
        .chat-input-area { display: flex; padding: 10px; background: #1a1a1a; border-top: 1px solid #333; }
        .chat-input-area input { flex: 1; background: #000; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 5px; outline: none; }

        .hidden { display: none !important; }
        .btn-action { width: 100%; padding: 15px; margin-top: 10px; font-weight: bold; border: 2px solid #444; background: none; color: white; cursor: pointer; transition: 0.2s; border-radius: 8px; font-size: 1em; }
        .btn-action:hover:not(:disabled) { background: rgba(255,255,255,0.1); border-color: white; }
        .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="blackout"></div>

    <div id="menu-screen">
        <h1 class="title">THE PLATFORM</h1>
        <div id="menu-main">
            <button class="btn-menu" onclick="startSingleGame()">혼자 하기 (AI)</button><br>
            <button class="btn-menu" onclick="uiCreateRoom()">방 만들기 (Create)</button><br>
            <div style="margin-top:15px;">
                <input type="text" id="room-input" placeholder="CODE" class="input-code">
                <button class="btn-menu" style="width:110px; padding:15px;" onclick="uiJoinRoom()">입장</button>
            </div>
        </div>

        <div id="lobby-ui" class="hidden">
            <h2 style="color:var(--orange); font-size:2em; margin:0;">방 코드: <span id="display-code">----</span></h2>
            <p id="player-count" style="font-size:1.2em; margin:20px 0;">참여 대기: 0/4</p>
            <button id="start-btn" class="btn-menu" style="border-color:var(--green); color:var(--green);" onclick="requestStart()">게임 시작하기</button>
            <p id="wait-msg" class="hidden" style="color:#777;">방장이 게임을 시작하기를 기다리고 있습니다...</p>
        </div>
    </div>

    <div id="game-wrapper" class="hidden">
        <div id="tower">
            <div id="platform-overlay"></div>
            <div class="floor" id="floor-1"></div>
            <div class="floor" id="floor-2"></div>
            <div class="floor" id="floor-3"></div>
            <div class="floor" id="floor-4"></div>
        </div>

        <div id="side-panel">
            <div class="panel">
                <div id="timer-display">30</div>
                <div style="display:flex; justify-content: space-between; font-size:1.2em; font-weight:bold; margin: 10px 0;">
                    <span>DAY <span id="day-val">1</span></span>
                    <span style="color:var(--orange);"><span id="floor-val">?</span>F</span>
                </div>
                <div style="background:#000; padding:10px; border-radius:5px; margin-bottom:10px;">
                    <div>나의 허기: <span id="hunger-val" style="color:var(--green)">100</span> / 100</div>
                    <div>남은 음식: <span id="food-val" style="color:var(--red)">120</span></div>
                </div>
                <button id="eat-btn" class="btn-action" style="border-color:var(--red);" onclick="actionEat()">음식 먹기 (Eat)</button>
                <button id="ride-btn" class="btn-action" style="border-color:var(--orange);" onclick="actionRide()">플랫폼 탑승 (Ride)</button>
                <button id="weapon-btn" class="btn-action" onclick="handleWeapon()">파이프 제작 (Craft)</button>
                <div id="log-box" style="margin-top:15px; font-size:12px; color:#888; height:40px; overflow:hidden; border-top:1px solid #333; padding-top:10px;"></div>
            </div>

            <div id="chat-box">
                <div id="messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendChat()">
                    <button onclick="sendChat()" style="background:var(--red); border:none; color:white; padding:0 15px; cursor:pointer; font-weight:bold; margin-left:5px; border-radius:5px;">전송</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let gameState = { day: 1, food: 120, players: {}, platformLevel: 0, isGameOver: false };
        let myID, isMulti = false, currentRoomCode = null, isRiding = false, hasEaten = false, weaponStatus = "NOT_MADE";

        // [방 시스템]
        function uiCreateRoom() { const n = prompt("닉네임을 입력하세요"); if(n) socket.emit('createRoom', n); }
        function uiJoinRoom() { 
            const c = document.getElementById('room-input').value.toUpperCase();
            const n = prompt("닉네임을 입력하세요"); if(c && n) socket.emit('joinRoom', { roomCode: c, nickname: n });
        }
        function requestStart() { if(currentRoomCode) socket.emit('startGame', currentRoomCode); }

        socket.on('roomCreated', (data) => {
            currentRoomCode = data.roomCode;
            document.getElementById('menu-main').classList.add('hidden');
            document.getElementById('lobby-ui').classList.remove('hidden');
            document.getElementById('display-code').innerText = currentRoomCode;
            document.getElementById('player-count').innerText = `참여 대기: ${data.players.length}/4`;
        });

        socket.on('playerJoined', (data) => {
            document.getElementById('player-count').innerText = `참여 대기: ${data.players.length}/4`;
            if(socket.id !== gameState.players[Object.keys(gameState.players)[0]]) {
                document.getElementById('start-btn').classList.add('hidden');
                document.getElementById('wait-msg').classList.remove('hidden');
            }
        });

        socket.on('gameStart', (data) => {
            isMulti = true; myID = socket.id; currentRoomCode = data.room.code;
            data.room.players.forEach(p => { gameState.players[p.id] = p; });
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-wrapper').classList.remove('hidden');
            runDayCycle();
        });

        // [싱글 플레이 모드]
        function startSingleGame() {
            isMulti = false; myID = "me";
            gameState.players = { "me": { id:"me", name:"나", hunger:100, floor:0, alive:true, color:"var(--green)" } };
            for(let i=1; i<=3; i++) gameState.players[`ai${i}`] = { id:`ai${i}`, name:`AI ${i}`, hunger:100, floor:0, alive:true, color:"#666", isAI:true };
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-wrapper').classList.remove('hidden');
            runDayCycle();
        }

        // [게임 사이클]
        async function runDayCycle() {
            if(gameState.isGameOver) return;
            document.getElementById('blackout').classList.add('active');
            
            // 층 랜덤 배정
            const floors = [1,2,3,4].sort(()=>Math.random()-0.5);
            Object.values(gameState.players).forEach((p,i) => { if(p.alive) p.floor = floors[i%4]; });
            isRiding = false; render();
            
            await new Promise(r => setTimeout(r, 600));
            document.getElementById('blackout').classList.remove('active');

            for(let f=1; f<=4; f++) {
                gameState.platformLevel = f;
                document.getElementById('platform-overlay').style.top = `${(f-1)*25}%`;
                hasEaten = false;
                
                if(gameState.players[myID].floor === f || isRiding) {
                    if(isRiding) gameState.players[myID].floor = f;
                    render(); updateButtons(f);
                    await startTimer(30);
                    disableButtons();
                } else {
                    if(!isMulti) { // AI 동작 시뮬레이션
                        Object.values(gameState.players).filter(p => p.floor === f && p.isAI && p.alive).forEach(ai => {
                            let eatAmt = Math.min(gameState.food, 40); gameState.food -= eatAmt;
                            ai.hunger = Math.min(100, ai.hunger + (eatAmt * 1.3));
                        });
                    }
                    await new Promise(r => setTimeout(r, 1500)); 
                }
            }
            
            // 하루 종료 정산
            Object.values(gameState.players).forEach(p => { 
                if(p.alive) { p.hunger -= 25; if(p.hunger <= 0) { p.hunger = 0; p.alive = false; addLog(`${p.name}님이 아사했습니다.`); } }
            });
            
            if(gameState.players[myID].alive) { 
                gameState.day++; gameState.food = 120; 
                addLog(`DAY ${gameState.day}가 시작되었습니다.`);
                setTimeout(runDayCycle, 1500); 
            } else {
                alert("당신은 굶주림을 이기지 못하고 사망했습니다...");
                location.reload();
            }
        }

        // [기능 함수들]
        function actionEat() {
            if(hasEaten || gameState.food <= 0) return;
            hasEaten = true;
            if(isMulti) {
                socket.emit('playerEat', { roomCode: currentRoomCode });
            } else {
                gameState.food -= 40;
                gameState.players[myID].hunger = Math.min(100, gameState.players[myID].hunger + 55);
                render();
            }
            updateButtons(gameState.platformLevel);
        }

        function actionRide() { isRiding = true; document.getElementById('ride-btn').disabled = true; addLog("플랫폼에 탑승했습니다."); }

        function handleWeapon() {
            if(weaponStatus === "NOT_MADE") {
                weaponStatus = "READY"; addLog("파이프 무기를 제작했습니다!");
            } else if(weaponStatus === "READY") {
                const target = Object.values(gameState.players).find(p => p.floor === gameState.players[myID].floor && p.id !== myID && p.alive);
                if(target) {
                    if(isMulti) socket.emit('playerAttack', { roomCode: currentRoomCode, targetID: target.id });
                    else { target.hunger -= 30; if(target.hunger < 0) target.alive = false; render(); }
                    weaponStatus = "USED"; addLog(`${target.name}님을 공격했습니다!`);
                } else {
                    alert("공격할 대상이 같은 층에 없습니다!");
                }
            }
            updateButtons(gameState.platformLevel);
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            if(isMulti) {
                socket.emit('sendMsg', { roomCode: currentRoomCode, sender: gameState.players[myID].name, msg: input.value });
            } else {
                addChatMessage("나", input.value);
            }
            input.value = "";
        }

        // [통신 수신 처리]
        socket.on('syncEat', (data) => {
            gameState.food = data.newFood;
            if(gameState.players[data.eaterID]) {
                gameState.players[data.eaterID].hunger = Math.min(100, gameState.players[data.eaterID].hunger + 55);
            }
            render();
        });

        socket.on('syncAttack', (data) => {
            const victim = gameState.players[data.targetID];
            if(victim) {
                victim.hunger -= 30; if(victim.hunger < 0) victim.alive = false;
                addLog(`${victim.name}님이 공격받았습니다!`);
                render();
            }
        });

        socket.on('receiveMsg', (data) => { addChatMessage(data.sender, data.msg); });
        socket.on('joinError', (msg) => { alert(msg); });

        // [유틸리티]
        function startTimer(sec) {
            return new Promise(resolve => {
                let timeLeft = sec;
                const display = document.getElementById('timer-display');
                const interval = setInterval(() => {
                    display.innerText = timeLeft;
                    if(timeLeft-- <= 0) { clearInterval(interval); resolve(); }
                }, 1000);
            });
        }

        function render() {
            document.getElementById('day-val').innerText = gameState.day;
            document.getElementById('hunger-val').innerText = Math.ceil(gameState.players[myID].hunger);
            document.getElementById('food-val').innerText = gameState.food;
            document.getElementById('floor-val').innerText = gameState.players[myID].floor || "?";
            
            for(let i=1; i<=4; i++) document.getElementById(`floor-${i}`).innerHTML = `<span style="position:absolute;left:8px;top:8px;color:#333;font-size:12px;font-weight:bold;">${i}F</span>`;
            
            Object.values(gameState.players).forEach(p => {
                if(p.alive && p.floor > 0) {
                    const pDiv = document.createElement('div');
                    pDiv.className = `player ${p.id === myID ? 'you' : ''}`;
                    pDiv.style.backgroundColor = p.color;
                    pDiv.innerHTML = `<span>${p.name}</span><span style="font-size:14px;">${Math.ceil(p.hunger)}</span>`;
                    document.getElementById(`floor-${p.floor}`).appendChild(pDiv);
                }
            });
        }

        function updateButtons(f) {
            document.getElementById('eat-btn').disabled = (hasEaten || gameState.food <= 0);
            document.getElementById('ride-btn').disabled = (f === 4 || isRiding);
            const wBtn = document.getElementById('weapon-btn');
            if(weaponStatus === "NOT_MADE") { wBtn.innerText = "파이프 제작 (Craft)"; wBtn.disabled = false; }
            else if(weaponStatus === "READY") { wBtn.innerText = "파이프 사용 (Attack)"; wBtn.style.borderColor = "var(--red)"; }
            else { wBtn.innerText = "무기 소진"; wBtn.disabled = true; wBtn.style.borderColor = "#333"; }
        }

        function disableButtons() {
            document.querySelectorAll('.btn-action').forEach(b => b.disabled = true);
        }

        function addChatMessage(sender, msg) {
            const container = document.getElementById('messages');
            container.innerHTML += `<div class="msg"><strong>${sender}:</strong> ${msg}</div>`;
            container.scrollTop = container.scrollHeight;
        }

        function addLog(m) {
            const box = document.getElementById('log-box');
            box.innerHTML = `> ${m}<br>` + box.innerHTML;
        }
    </script>
</body>
</html>
